<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEIE &middot; Gestao de Espacos e Infraestrutura Escolar</title>
<style>
  :root{
    --azul:#1f4e8c; --azul2:#2f6fbf; --azul-claro:#eaf1fb;
    --verde:#2e9e5b; --verde-bg:#eaf6ee; --vermelho:#cc3b3b; --vermelho-bg:#fdeaea;
    --amarelo:#e0a800; --amarelo-bg:#fff7e6; --cinza:#f0f2f5; --texto:#1f2733;
    --muted:#6b7787; --borda:#dde3ec;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,Arial,sans-serif}
  html,body{height:100%}
  body{background:#eef1f6;color:var(--texto);display:flex}
  a{color:inherit;text-decoration:none}

  /* ===== layout ===== */
  .sidebar{width:240px;background:var(--azul);color:#fff;min-height:100vh;flex-shrink:0;
    position:fixed;top:0;left:0;display:flex;flex-direction:column;padding:18px 0}
  .brand{padding:0 20px 16px;border-bottom:1px solid rgba(255,255,255,.15);margin-bottom:10px}
  .brand b{font-size:18px;letter-spacing:.5px}
  .brand small{display:block;font-size:11px;opacity:.8;margin-top:3px}
  .nav a{display:flex;align-items:center;gap:11px;padding:11px 20px;font-size:14px;color:#dbe6f6;cursor:pointer;border-left:3px solid transparent}
  .nav a:hover{background:rgba(255,255,255,.08)}
  .nav a.active{background:rgba(255,255,255,.14);color:#fff;border-left-color:#fff;font-weight:600}
  .nav .ico{width:20px;text-align:center;font-size:15px}
  .nav .grupo{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.6;padding:14px 20px 6px}
  .side-foot{margin-top:auto;padding:14px 20px;font-size:10px;opacity:.6}

  .content{margin-left:240px;flex:1;min-height:100vh}
  .topbar{background:#fff;border-bottom:1px solid var(--borda);padding:14px 30px;display:flex;
    justify-content:space-between;align-items:center;position:sticky;top:0;z-index:5}
  .topbar h1{font-size:18px;color:var(--azul)}
  .topbar .persona{font-size:12px;color:var(--muted);text-align:right}
  .topbar .persona b{color:var(--texto)}
  .page{padding:26px 30px 60px;max-width:1100px}

  /* ===== componentes ===== */
  h2{font-size:16px;color:var(--azul);margin-bottom:6px}
  .lead{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.55;max-width:720px}
  .card{background:#fff;border:1px solid var(--borda);border-radius:12px;padding:20px;margin-bottom:18px}
  .card h3{font-size:14px;color:var(--azul);margin-bottom:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}

  label{font-size:12px;color:var(--muted);display:block;margin:12px 0 5px}
  input,select{width:100%;padding:9px 11px;border:1px solid var(--borda);border-radius:8px;font-size:13px;background:#fff}
  input:focus,select:focus{outline:2px solid var(--azul-claro);border-color:var(--azul2)}

  .btn{display:inline-block;background:var(--azul2);color:#fff;border:none;padding:10px 18px;border-radius:9px;
    font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
  .btn:hover{background:var(--azul)}
  .btn.verde{background:var(--verde)} .btn.verde:hover{filter:brightness(.93)}
  .btn.vermelho{background:var(--vermelho)} .btn.vermelho:hover{filter:brightness(.93)}
  .btn.ghost{background:var(--azul-claro);color:var(--azul)}
  .btn.sm{padding:7px 12px;font-size:12px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-row{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}

  .chip{display:inline-block;background:#eef2f8;color:var(--azul);border-radius:20px;padding:7px 14px;
    font-size:12px;margin:4px 6px 4px 0;cursor:pointer;border:1px solid var(--borda);user-select:none}
  .chip.on{background:var(--azul);color:#fff;border-color:var(--azul)}
  .chip.lock{background:var(--verde-bg);color:var(--verde);border-color:#bfe3cb;cursor:default}

  .sala{border:1px solid var(--borda);border-radius:10px;padding:14px;margin-bottom:12px;display:flex;
    justify-content:space-between;align-items:center;gap:12px}
  .sala .meta b{font-size:14px} .sala .meta small{color:var(--muted);font-size:12px;display:block;margin-top:3px}
  .tag{font-size:10px;padding:3px 9px;border-radius:6px;font-weight:600;display:inline-block}
  .tag.livre{background:var(--verde-bg);color:var(--verde)}
  .tag.ocupada{background:var(--vermelho-bg);color:var(--vermelho)}
  .tag.reservada{background:var(--amarelo-bg);color:#a87c00}
  .equip{font-size:11px;color:var(--muted);margin-top:4px}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .kpi{background:#fff;border:1px solid var(--borda);border-radius:12px;padding:16px}
  .kpi b{font-size:26px;color:var(--azul);display:block}
  .kpi small{font-size:11px;color:var(--muted)}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--borda)}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600}
  .badge.r{background:var(--vermelho-bg);color:var(--vermelho)}
  .badge.o{background:var(--verde-bg);color:var(--verde)}
  .badge.a{background:var(--amarelo-bg);color:#a87c00}

  .alerta{border-radius:10px;padding:14px;font-size:13px;margin-bottom:12px;border:1px solid}
  .alerta.amar{background:var(--amarelo-bg);border-color:var(--amarelo)}
  .alerta.verm{background:var(--vermelho-bg);border-color:var(--vermelho)}
  .alerta b{display:block;margin-bottom:3px}
  .alerta.ok{background:var(--verde-bg);border-color:var(--verde);color:var(--verde)}

  /* mapa campus */
  .legenda{font-size:12px;display:flex;gap:18px;margin:6px 0 12px}
  .legenda span{display:flex;align-items:center;gap:6px}
  .dot{width:12px;height:12px;border-radius:3px;display:inline-block}
  .mapa{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .room{border-radius:10px;padding:14px 8px;text-align:center;color:#fff;cursor:pointer;border:3px solid transparent;transition:.12s}
  .room small{display:block;font-size:10px;opacity:.9;margin-top:3px;font-weight:400}
  .room b{font-size:13px}
  .room.livre{background:var(--verde)} .room.livre:hover{filter:brightness(1.07)}
  .room.reservada{background:var(--amarelo)}
  .room.ocupada{background:var(--vermelho);cursor:not-allowed;opacity:.9}
  .room.sel{border-color:#1f2733;box-shadow:0 0 0 3px rgba(31,39,51,.15)}

  .qr{width:160px;height:160px;margin:16px 0;background:
    conic-gradient(#000 25%,#fff 0 50%,#000 0 75%,#fff 0);border:9px solid #000;border-radius:6px}
  .ok-circle{width:60px;height:60px;border-radius:50%;background:var(--verde);color:#fff;font-size:32px;
    display:flex;align-items:center;justify-content:center;margin-bottom:12px}

  .home-hero{background:linear-gradient(120deg,var(--azul),var(--azul2));color:#fff;border-radius:14px;padding:28px;margin-bottom:22px}
  .home-hero h2{color:#fff;font-size:20px;margin-bottom:8px}
  .home-hero p{font-size:13px;opacity:.92;max-width:640px;line-height:1.6}
  .cen-card{background:#fff;border:1px solid var(--borda);border-radius:12px;padding:18px;cursor:pointer;transition:.15s}
  .cen-card:hover{border-color:var(--azul2);box-shadow:0 6px 18px rgba(31,78,140,.08);transform:translateY(-2px)}
  .cen-card .ic{width:42px;height:42px;border-radius:10px;background:var(--azul-claro);color:var(--azul);
    display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
  .cen-card b{font-size:14px;color:var(--azul);display:block}
  .cen-card .who{font-size:11px;color:var(--muted);margin:4px 0 8px}
  .cen-card p{font-size:12px;color:var(--muted);line-height:1.5}

  .rota{background:var(--cinza);border-radius:10px;height:230px;margin:12px 0;overflow:hidden}
  .rota svg{width:100%;height:100%}
  .empty{color:var(--muted);font-size:13px;padding:16px;text-align:center}
  .pill-persona{font-size:11px;background:var(--azul-claro);color:var(--azul);padding:4px 12px;border-radius:20px;font-weight:600}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand">
    <b>GEIE</b>
    <small>Gestao de Espacos e Infraestrutura Escolar</small>
  </div>
  <nav class="nav" id="nav">
    <a data-route="inicio"><span class="ico">&#9632;</span> Inicio</a>
    <div class="grupo">Cenarios</div>
    <a data-route="buscar"><span class="ico">&#128269;</span> Buscar Sala Agora</a>
    <a data-route="agendar"><span class="ico">&#128197;</span> Novo Agendamento</a>
    <a data-route="localizar"><span class="ico">&#128205;</span> Buscar Salas Ocupadas</a>
    <a data-route="painel"><span class="ico">&#128202;</span> Painel de Controle</a>
    <div class="grupo">Geral</div>
    <a data-route="agendamentos"><span class="ico">&#128203;</span> Meus Agendamentos</a>
    <a data-route="mapa"><span class="ico">&#128506;</span> Mapa do Campus</a>
  </nav>
  <div class="side-foot">Prototipo de apresentacao<br>IFAL &middot; IHC &middot; 2026</div>
</aside>

<div class="content">
  <div class="topbar">
    <h1 id="page-title">Inicio</h1>
    <div class="persona" id="persona-box"></div>
  </div>
  <main class="page" id="app"></main>
</div>

<script>
/* ============================================================
   ESTADO COMPARTILHADO
============================================================ */
const EQUIP = ['Projetor','Tomada','Ar-condicionado','Computadores','Quadro'];

let state = {
  rooms: [
    {id:'A-101', bloco:'A', cap:40, cat:'Sala de aula',           equip:['Projetor','Tomada','Quadro'], status:'livre',     sensor:'vazio'},
    {id:'A-102', bloco:'A', cap:35, cat:'Sala de aula',           equip:['Tomada','Quadro'],            status:'ocupada',   sensor:'presenca'},
    {id:'B-1',   bloco:'B', cap:80, cat:'Auditorio',              equip:['Projetor','Tomada','Ar-condicionado'], status:'livre', sensor:'vazio'},
    {id:'B-110', bloco:'B', cap:45, cat:'Sala de aula',           equip:['Projetor','Tomada','Ar-condicionado','Quadro'], status:'ocupada', sensor:'presenca'},
    {id:'C-204', bloco:'C', cap:45, cat:'Sala de aula',           equip:['Projetor','Tomada','Quadro'], status:'livre',     sensor:'vazio'},
    {id:'C-205', bloco:'C', cap:30, cat:'Sala de Reuniao/Estudo', equip:['Tomada','Ar-condicionado'],   status:'livre',     sensor:'vazio'},
    {id:'R-101', bloco:'C', cap:12, cat:'Sala de Reuniao/Estudo', equip:['Tomada','Quadro'],            status:'livre',     sensor:'vazio'},
    {id:'R-102', bloco:'C', cap:10, cat:'Sala de Reuniao/Estudo', equip:['Tomada'],                     status:'ocupada',   sensor:'presenca'},
    {id:'Lab-03',bloco:'D', cap:30, cat:'Laboratorio',            equip:['Computadores','Projetor','Ar-condicionado'], status:'reservada', sensor:'vazio'},
    {id:'Lab-07',bloco:'D', cap:30, cat:'Laboratorio',            equip:['Computadores','Tomada'],      status:'ocupada',   sensor:'presenca'},
    {id:'D-110', bloco:'D', cap:40, cat:'Sala de aula',           equip:['Projetor','Tomada','Quadro'], status:'reservada', sensor:'vazio'},
    {id:'Aud-P', bloco:'B', cap:120,cat:'Auditorio',              equip:['Projetor','Ar-condicionado'], status:'reservada', sensor:'vazio'},
  ],
  appointments: [
    {sala:'D-110', data:'2026-06-25', inicio:'18:50', fim:'20:30', just:'Aula SI-302 Fisica (realocada)', persona:'Coordenacao', disc:'SI-302'},
    {sala:'Aud-P', data:'2026-06-26', inicio:'14:00', fim:'16:00', just:'Palestra - Prof. Souza',          persona:'Prof. Souza'},
    {sala:'Aud-P', data:'2026-06-26', inicio:'14:00', fim:'16:00', just:'Defesa de TCC - Prof. Andrade',   persona:'Prof. Andrade'},
  ],
  reservas: [],          // reservas imediatas (Augusto)
  // disciplina -> sala atual (realocacoes)
  disciplinas: { 'SI-302':'D-110', 'SI-104':'B-110', 'SI-210':'Lab-07' },
};

const route = () => (location.hash.replace('#/','') || 'inicio');
const room = id => state.rooms.find(r=>r.id===id);
const fmtEquip = arr => arr.join(' &middot; ');

const PERSONAS = {
  inicio:      '',
  buscar:      'Cenario 1 &middot; <b>Augusto Carlos</b>, 42 &middot; Professor de Fisica',
  agendar:     'Cenario 2 &middot; <b>Ana Lima</b>, 22 &middot; Aluna / Coord. de extensao',
  localizar:   'Cenario 4 &middot; <b>Gabriela Ciresi</b>, 19 &middot; Discente de SI',
  painel:      'Cenario 3 &middot; <b>Marcos Ramos</b>, 51 &middot; Coord. administrativo',
  agendamentos:'', mapa:'',
};
const TITLES = {inicio:'Inicio', buscar:'Buscar Sala Agora', agendar:'Novo Agendamento',
  localizar:'Buscar Salas Ocupadas', painel:'Painel de Controle', agendamentos:'Meus Agendamentos', mapa:'Mapa do Campus'};

/* ============================================================
   HELPERS
============================================================ */
function download(nome, texto){
  const blob = new Blob([texto], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = nome; a.click();
  URL.revokeObjectURL(a.href);
}
function statusTag(s){ return `<span class="tag ${s}">${s}</span>`; }
function notify(msg){ const b=document.getElementById('toast'); if(!b)return; b.textContent=msg; b.style.display='block';
  clearTimeout(window._tt); window._tt=setTimeout(()=>b.style.display='none',3500); }

/* ============================================================
   PAGINAS
============================================================ */
const Pages = {
  /* -------- INICIO -------- */
  inicio(){
    const livres = state.rooms.filter(r=>r.status==='livre').length;
    return `
    <div class="home-hero">
      <h2>Bem-vindo ao GEIE</h2>
      <p>Sistema de gestao de espacos e infraestrutura escolar. Encontre, reserve e monitore
      salas em tempo real. Navegue pelos cenarios abaixo &mdash; as acoes se conectam entre as telas
      (uma reserva aparece no mapa e no painel administrativo).</p>
    </div>
    <div class="kpis">
      <div class="kpi"><b>${state.rooms.length}</b><small>Salas cadastradas</small></div>
      <div class="kpi"><b>${livres}</b><small>Disponiveis agora</small></div>
      <div class="kpi"><b>${state.appointments.length}</b><small>Agendamentos</small></div>
      <div class="kpi"><b>${detectConflitos().length}</b><small>Conflitos ativos</small></div>
    </div>
    <div class="grid2">
      <div class="cen-card" onclick="nav('buscar')">
        <div class="ic">&#128269;</div><b>Buscar Sala Agora</b>
        <div class="who">Augusto, 42 &middot; Professor de Fisica</div>
        <p>Imprevisto em sala: ache e reserve uma sala com projetor em minutos, com QR Code de acesso.</p>
      </div>
      <div class="cen-card" onclick="nav('agendar')">
        <div class="ic">&#128197;</div><b>Novo Agendamento</b>
        <div class="who">Ana, 22 &middot; Coord. de extensao</div>
        <p>Reserve uma sala de reuniao pelo mapa visual do campus, sem depender de e-mail.</p>
      </div>
      <div class="cen-card" onclick="nav('localizar')">
        <div class="ic">&#128205;</div><b>Buscar Salas Ocupadas</b>
        <div class="who">Gabriela, 19 &middot; Discente de SI</div>
        <p>Descubra para qual sala a aula foi realocada e veja a rota ate ela.</p>
      </div>
      <div class="cen-card" onclick="nav('painel')">
        <div class="ic">&#128202;</div><b>Painel de Controle</b>
        <div class="who">Marcos, 51 &middot; Coord. administrativo</div>
        <p>Monitore ocupacao em tempo real, resolva conflitos e exporte o relatorio de ociosidade.</p>
      </div>
    </div>`;
  },

  /* -------- BUSCAR (Augusto) -------- */
  buscar(){
    return `
    <h2>Imprevisto em sala de aula</h2>
    <p class="lead">Sua sala habitual esta trancada por manutencao e a aula comeca em 10 minutos.
    Aplique os filtros e reserve uma sala disponivel agora.</p>
    <div class="card">
      <h3>Filtros rapidos</h3>
      <div id="chips">
        <span class="chip lock">&#10003; Disponibilidade imediata</span>
        <span class="chip on" data-f="cap">Capacidade 40+</span>
        <span class="chip on" data-f="Projetor">Projetor</span>
        <span class="chip" data-f="Tomada">Tomada</span>
        <span class="chip" data-f="Ar-condicionado">Ar-condicionado</span>
      </div>
      <div class="btn-row"><button class="btn" onclick="Actions.buscarSalas()">Buscar agora</button></div>
    </div>
    <div id="resultados"></div>`;
  },

  /* -------- AGENDAR (Ana) -------- */
  agendar(){
    return `
    <h2>Agendamento agil via celular/desktop</h2>
    <p class="lead">Reserve uma sala para a reuniao do seu projeto sem trocar e-mails com a secretaria.
    Escolha data, horario e categoria, depois selecione uma sala livre no mapa.</p>
    <div class="grid2">
      <div class="card">
        <h3>Dados da reserva</h3>
        <label>Data</label><input type="date" id="ag-data" value="2026-06-26">
        <div class="grid2">
          <div><label>Inicio</label><input type="time" id="ag-ini" value="14:00"></div>
          <div><label>Termino</label><input type="time" id="ag-fim" value="16:00"></div>
        </div>
        <label>Categoria</label>
        <select id="ag-cat">
          <option>Sala de Reuniao/Estudo</option><option>Sala de aula</option>
          <option>Laboratorio</option><option>Auditorio</option>
        </select>
        <label>Justificativa</label>
        <input id="ag-just" value="Reuniao do projeto de extensao">
      </div>
      <div class="card">
        <h3>Mapa do campus</h3>
        <div class="legenda">
          <span><i class="dot" style="background:var(--verde)"></i>Livre</span>
          <span><i class="dot" style="background:var(--amarelo)"></i>Reservada</span>
          <span><i class="dot" style="background:var(--vermelho)"></i>Ocupada</span>
        </div>
        <div class="mapa" id="ag-mapa"></div>
        <div class="btn-row">
          <button class="btn verde" id="ag-confirm" disabled onclick="Actions.confirmarAgendamento()">Confirmar agendamento</button>
        </div>
        <div id="ag-result"></div>
      </div>
    </div>`;
  },

  /* -------- LOCALIZAR (Gabriela) -------- */
  localizar(){
    return `
    <h2>Onde esta a minha aula?</h2>
    <p class="lead">A sala habitual esta vazia e trancada para manutencao. Informe a disciplina
    para descobrir a sala atual e a rota ate ela.</p>
    <div class="card" style="max-width:520px">
      <label>Curso</label>
      <select id="lo-curso"><option>Sistemas de Informacao</option><option>Engenharia</option><option>Licenciaturas</option></select>
      <label>Codigo da disciplina</label>
      <select id="lo-cod">
        <option value="SI-302">SI-302 &mdash; Fisica</option>
        <option value="SI-104">SI-104 &mdash; Algoritmos</option>
        <option value="SI-210">SI-210 &mdash; Banco de Dados</option>
        <option value="SI-999">SI-999 &mdash; (sem realocacao)</option>
      </select>
      <div class="btn-row"><button class="btn" onclick="Actions.localizarSala()">Localizar sala</button></div>
    </div>
    <div id="lo-result"></div>`;
  },

  /* -------- PAINEL (Marcos) -------- */
  painel(){
    const emUso = state.rooms.filter(r=>r.status!=='livre').length;
    const ocup = Math.round(emUso/state.rooms.length*100);
    const ocios = state.rooms.filter(r=>r.status!=='livre' && r.sensor==='vazio');
    const conflitos = detectConflitos();
    const alertas = ocios.length + conflitos.length;

    const alertasHtml = `
      ${ocios.map(r=>`
        <div class="alerta amar">
          <b>&#9888; Sala reservada, porem vazia</b>
          Sensores indicam <b>${r.id}</b> (${r.cat}) sem presenca, apesar de constar como ${r.status}.
          <div class="btn-row"><button class="btn sm" onclick="Actions.liberarSala('${r.id}')">Liberar sala</button></div>
        </div>`).join('')}
      ${conflitos.map(c=>`
        <div class="alerta verm">
          <b>&#9888; Conflito de agendamento</b>
          ${c.length} professores alocaram <b>${c[0].sala}</b> em ${c[0].data} as ${c[0].inicio}.
          <div class="btn-row"><button class="btn sm vermelho" onclick="Actions.resolverConflito('${c[0].sala}','${c[0].data}','${c[0].inicio}')">Resolver com sala alternativa</button></div>
        </div>`).join('')}
      ${alertas===0?'<div class="alerta ok">&#10003; Nenhum alerta ativo no momento.</div>':''}`;

    return `
    <h2>Visao estrategica e controle de conflitos</h2>
    <p class="lead">Ocupacao em tempo real de todo o campus. As reservas e agendamentos feitos nas
    outras telas aparecem aqui automaticamente.</p>
    <div class="kpis">
      <div class="kpi"><b>${ocup}%</b><small>Ocupacao agora</small></div>
      <div class="kpi"><b>${emUso}</b><small>Salas em uso/reservadas</small></div>
      <div class="kpi"><b>${alertas}</b><small>Alertas ativos</small></div>
      <div class="kpi"><b>${state.appointments.length}</b><small>Agendamentos</small></div>
    </div>
    <div class="grid2">
      <div class="card"><h3>Alertas em tempo real</h3>${alertasHtml}</div>
      <div class="card">
        <h3>Ocupacao por sala</h3>
        <table><thead><tr><th>Sala</th><th>Categoria</th><th>Status</th><th>Sensor</th></tr></thead><tbody>
        ${state.rooms.map(r=>`<tr>
          <td><b>${r.id}</b></td><td>${r.cat}</td>
          <td><span class="badge ${r.status==='livre'?'o':r.status==='reservada'?'a':'r'}">${r.status}</span></td>
          <td>${r.sensor==='presenca'?'Presenca':'Vazio'}</td></tr>`).join('')}
        </tbody></table>
      </div>
    </div>
    <div class="card">
      <h3>Relatorio mensal de ociosidade</h3>
      <table><thead><tr><th>Horario</th><th>Salas ociosas</th><th>Acao sugerida</th></tr></thead><tbody>
        <tr><td>08h - 10h</td><td>3</td><td>Remanejar turma A para Bloco C</td></tr>
        <tr><td>10h - 12h</td><td>1</td><td>-</td></tr>
        <tr><td>14h - 16h</td><td>5</td><td>Otimizar alocacao de laboratorios</td></tr>
        <tr><td>16h - 18h</td><td>2</td><td>-</td></tr>
      </tbody></table>
      <div class="btn-row"><button class="btn ghost" onclick="Actions.exportarRelatorio()">&#11015; Exportar relatorio (.txt)</button></div>
    </div>`;
  },

  /* -------- MEUS AGENDAMENTOS -------- */
  agendamentos(){
    const all = [...state.appointments];
    return `
    <h2>Meus agendamentos</h2>
    <p class="lead">Todas as reservas e agendamentos registrados no sistema.</p>
    <div class="card">
      ${all.length===0?'<div class="empty">Nenhum agendamento ainda.</div>':`
      <table><thead><tr><th>Sala</th><th>Data</th><th>Horario</th><th>Solicitante</th><th>Justificativa</th></tr></thead><tbody>
      ${all.map(a=>`<tr><td><b>${a.sala}</b></td><td>${a.data}</td><td>${a.inicio} - ${a.fim}</td>
        <td>${a.persona||'-'}</td><td>${a.just}</td></tr>`).join('')}
      </tbody></table>`}
    </div>
    ${state.reservas.length?`<div class="card"><h3>Reservas imediatas</h3>
      <table><thead><tr><th>Sala</th><th>Hora</th><th>Acesso</th></tr></thead><tbody>
      ${state.reservas.map(r=>`<tr><td><b>${r.sala}</b></td><td>${r.hora}</td><td>QR Code gerado</td></tr>`).join('')}
      </tbody></table></div>`:''}`;
  },

  /* -------- MAPA -------- */
  mapa(){
    return `
    <h2>Mapa do campus</h2>
    <p class="lead">Status atual de todas as salas. Verde = livre, amarelo = reservada, vermelho = ocupada.</p>
    <div class="card">
      <div class="legenda">
        <span><i class="dot" style="background:var(--verde)"></i>Livre</span>
        <span><i class="dot" style="background:var(--amarelo)"></i>Reservada</span>
        <span><i class="dot" style="background:var(--vermelho)"></i>Ocupada</span>
      </div>
      <div class="mapa">
      ${state.rooms.map(r=>`<div class="room ${r.status}"><b>${r.id}</b><small>${r.cat}</small><small>cap. ${r.cap}</small></div>`).join('')}
      </div>
    </div>`;
  },
};

/* ============================================================
   ACOES (interligam o estado)
============================================================ */
const Actions = {
  buscarSalas(){
    const chips = [...document.querySelectorAll('#chips .chip.on')];
    const cap40 = chips.some(c=>c.dataset.f==='cap');
    const equipReq = chips.filter(c=>c.dataset.f && c.dataset.f!=='cap').map(c=>c.dataset.f);
    const res = state.rooms.filter(r=> r.status==='livre'
      && (!cap40 || r.cap>=40)
      && equipReq.every(e=>r.equip.includes(e)));
    const box = document.getElementById('resultados');
    if(!res.length){ box.innerHTML = `<div class="card"><div class="empty">Nenhuma sala livre com esses filtros. Tente remover algum.</div></div>`; return; }
    box.innerHTML = `<div class="card"><h3>${res.length} sala(s) encontrada(s)</h3>
      ${res.map((r,i)=>`<div class="sala">
        <div class="meta"><b>${r.id} &middot; ${r.cat} ${statusTag('livre')}</b>
          <small>Bloco ${r.bloco} &middot; capacidade ${r.cap}</small>
          <div class="equip">${fmtEquip(r.equip)}</div></div>
        <button class="btn ${i===0?'verde':'ghost'}" onclick="Actions.reservarAgora('${r.id}')">Reservar</button>
      </div>`).join('')}</div>`;
  },

  reservarAgora(id){
    const r = room(id);
    r.status='ocupada'; r.sensor='presenca';
    const hora = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    state.reservas.push({sala:id, hora});
    state.appointments.push({sala:id, data:'2026-06-25', inicio:hora, fim:'20:30', just:'Reserva imediata - aula', persona:'Augusto Carlos'});
    document.getElementById('resultados').innerHTML = `
      <div class="card" style="text-align:center;display:flex;flex-direction:column;align-items:center">
        <div class="ok-circle">&#10003;</div>
        <h3>Reserva de ${id} aprovada</h3>
        <p class="lead" style="text-align:center">A equipe de seguranca foi notificada para liberar a porta remotamente.
        Use o QR Code abaixo para acessar a sala.</p>
        <div class="qr"></div>
        <p class="lead" style="text-align:center">${id} &middot; valido a partir das ${hora}</p>
        <div class="btn-row" style="justify-content:center">
          <button class="btn ghost" onclick="nav('painel')">Ver no painel</button>
          <button class="btn" onclick="nav('buscar')">Nova busca</button>
        </div>
      </div>`;
    notify(`Sala ${id} reservada. Visivel no painel e no mapa.`);
  },

  confirmarAgendamento(){
    const sel = document.querySelector('#ag-mapa .room.sel');
    if(!sel) return;
    const id = sel.dataset.id;
    const data=val('ag-data'), ini=val('ag-ini'), fim=val('ag-fim'), just=val('ag-just')||'Agendamento';
    const r = room(id);
    if(r.status==='livre'){ r.status='reservada'; }
    state.appointments.push({sala:id, data, inicio:ini, fim, just, persona:'Ana Lima'});
    const comprovante = `COMPROVANTE DE AGENDAMENTO - GEIE
Sala: ${id}
Data: ${data}
Horario: ${ini} as ${fim}
Solicitante: Ana Lima
Justificativa: ${just}
Status: CONFIRMADO`;
    document.getElementById('ag-result').innerHTML = `
      <div class="alerta ok" style="margin-top:14px"><b>&#10003; Agendamento confirmado</b>
        Sala ${id} reservada para ${data}, ${ini} as ${fim}.</div>
      <div class="btn-row">
        <button class="btn ghost sm" onclick='Actions.baixarComprovante(${JSON.stringify(comprovante)})'>&#128196; Baixar comprovante (.txt)</button>
        <button class="btn ghost sm" onclick="nav('agendamentos')">Ver agendamentos</button>
      </div>`;
    renderMapaAgendar();
    notify(`Agendamento de ${id} confirmado e enviado ao calendario.`);
  },
  baixarComprovante(txt){ download('comprovante_agendamento.txt', txt); },

  localizarSala(){
    const cod = val('lo-cod');
    const salaId = state.disciplinas[cod];
    const box = document.getElementById('lo-result');
    if(!salaId){
      box.innerHTML = `<div class="card"><div class="empty">Nenhuma realocacao encontrada para ${cod}. A aula segue na sala habitual.</div></div>`;
      return;
    }
    const r = room(salaId);
    box.innerHTML = `<div class="card">
      <h3>Aula localizada</h3>
      <div class="sala"><div class="meta">
        <b>${cod} ${statusTag(r.status)}</b>
        <small>Realocada para: Bloco ${r.bloco} &middot; sala ${salaId} &middot; cap. ${r.cap}</small>
        <div class="equip">${fmtEquip(r.equip)}</div></div></div>
      <p class="lead" style="margin-top:10px">Rota recomendada ate a sala ${salaId}:</p>
      <div class="rota"><svg viewBox="0 0 320 210">
        <rect x="18" y="160" width="46" height="32" rx="5" fill="#cc3b3b" opacity=".85"/>
        <text x="41" y="153" font-size="10" text-anchor="middle" fill="#444">Voce</text>
        <path d="M41 160 L41 95 L165 95 L165 45 L270 45" stroke="#2f6fbf" stroke-width="6" fill="none" stroke-dasharray="9 7" stroke-linecap="round"/>
        <circle cx="270" cy="45" r="12" fill="#2e9e5b"/>
        <text x="270" y="26" font-size="10" text-anchor="middle" fill="#444">${salaId}</text>
      </svg></div>
      <p class="lead" style="text-align:center">Tempo estimado: 6 min &middot; chegada prevista 18:56</p>
    </div>`;
  },

  liberarSala(id){
    const r = room(id); r.status='livre'; r.sensor='vazio';
    notify(`${id} liberada e devolvida ao pool de salas disponiveis.`);
    render();
  },
  resolverConflito(sala,data,inicio){
    // mantem o primeiro, realoca os demais para uma sala livre de capacidade similar
    const conf = state.appointments.filter(a=>a.sala===sala && a.data===data && a.inicio===inicio);
    const orig = room(sala);
    const cands = state.rooms.filter(r=>r.status==='livre' && r.id!==sala);
    const alt = cands.filter(r=>r.cat===orig.cat).sort((a,b)=>b.cap-a.cap)[0] || cands.sort((a,b)=>b.cap-a.cap)[0];
    let movidos=0;
    conf.slice(1).forEach(a=>{ if(alt){ a.sala=alt.id; movidos++; } });
    if(alt && movidos){ alt.status='reservada'; notify(`Conflito resolvido: ${movidos} agendamento(s) movido(s) para ${alt.id} (mensagem automatica enviada).`); }
    else notify('Sem sala alternativa de capacidade equivalente disponivel.');
    render();
  },
  exportarRelatorio(){
    const linhas = state.rooms.map(r=>`${r.id};${r.cat};${r.status};${r.sensor}`).join('\n');
    const txt = `RELATORIO MENSAL DE OCIOSIDADE - GEIE
Gerado em: ${new Date().toLocaleString('pt-BR')}

Ocupacao atual por sala (sala;categoria;status;sensor):
${linhas}

Resumo de ociosidade por horario:
08h-10h; 3 salas ociosas; Remanejar turma A
10h-12h; 1 sala ociosa
14h-16h; 5 salas ociosas; Otimizar alocacao
16h-18h; 2 salas ociosas`;
    download('relatorio_ociosidade.txt', txt);
    notify('Relatorio de ociosidade exportado.');
  },
};

/* ============================================================
   LOGICA AUXILIAR
============================================================ */
function detectConflitos(){
  const map = {};
  state.appointments.forEach(a=>{ const k=a.sala+'|'+a.data+'|'+a.inicio; (map[k]=map[k]||[]).push(a); });
  return Object.values(map).filter(g=>g.length>1);
}
function val(id){ return document.getElementById(id).value; }

function renderMapaAgendar(){
  const box = document.getElementById('ag-mapa'); if(!box) return;
  box.innerHTML = state.rooms.map(r=>{
    const click = r.status==='livre' ? `onclick="selecionarSala(this,'${r.id}')"` : '';
    return `<div class="room ${r.status}" data-id="${r.id}" ${click}><b>${r.id}</b><small>${r.cat}</small><small>cap. ${r.cap}</small></div>`;
  }).join('');
  const c=document.getElementById('ag-confirm'); if(c) c.disabled=true;
}
function selecionarSala(el,id){
  document.querySelectorAll('#ag-mapa .room').forEach(r=>r.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('ag-confirm').disabled=false;
}

/* ============================================================
   ROTEADOR
============================================================ */
function render(){
  const r = route();
  const page = Pages[r] ? r : 'inicio';
  document.getElementById('app').innerHTML = Pages[page]();
  document.getElementById('page-title').textContent = TITLES[page];
  document.getElementById('persona-box').innerHTML = PERSONAS[page]||'';
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active', a.dataset.route===page));
  if(page==='agendar') renderMapaAgendar();
  window.scrollTo(0,0);
}
function nav(r){ location.hash = '#/'+r; }

document.getElementById('nav').addEventListener('click', e=>{
  const a=e.target.closest('a'); if(a){ e.preventDefault(); nav(a.dataset.route); }
});
document.addEventListener('click', e=>{
  const chip = e.target.closest('#chips .chip:not(.lock)');
  if(chip) chip.classList.toggle('on');
});
window.addEventListener('hashchange', render);

// toast
const toast=document.createElement('div'); toast.id='toast';
toast.style.cssText='position:fixed;bottom:24px;right:24px;background:#1f2733;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;display:none;z-index:50;max-width:320px;box-shadow:0 8px 24px rgba(0,0,0,.25)';
document.body.appendChild(toast);

window.nav=nav; window.Actions=Actions; window.Pages=Pages; window.state=state;
window.selecionarSala=selecionarSala; window.detectConflitos=detectConflitos;
window.render=render; window.val=val;
render();
</script>
</body>
</html>
